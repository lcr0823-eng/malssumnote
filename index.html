<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#173d67" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="말씀노트" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>말씀노트</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" data-nav="home" aria-label="처음으로">
          <span class="brand-mark">✦</span><span>말씀노트</span>
        </button>
        <div class="topbar-actions">
          <button class="icon-button" id="theme-toggle" aria-label="다크 모드 전환">◐</button>
          <button class="profile" id="sync-open" aria-label="동기화와 백업">↗</button>
        </div>
      </header>

      <main id="app" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="주요 메뉴">
        <button data-nav="home"><span>⌂</span><small>오늘</small></button>
        <button data-nav="sermons"><span>▤</span><small>설교</small></button>
        <button data-nav="schedule"><span>▦</span><small>일정</small></button>
        <button data-nav="notes"><span>✎</span><small>메모</small></button>
      </nav>
    </div>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');
    </script>
  </body>
</html>
